<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventConnect</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="#" class="logo">EventConnect</a>
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
      </div>
    </div>
  </nav>

  <header class="hero">
    <h1>Find Events Near You</h1>
    <p>Search for concerts, tech meetups, workshops, sports and more.</p>
    <div class="search-bar">
      <input id="keyword" type="text" placeholder="Search events..."/>
      <input id="city" type="text" placeholder="City..."/>
      <button onclick="doSearch()">Search</button>
    </div>
  </header>

  <main class="main">

    <div class="tabs">
      <button class="tab active" id="tab-events" onclick="switchTab('events')">Live Events</button>
      <button class="tab" id="tab-holidays" onclick="switchTab('holidays')">Public Holidays</button>
    </div>

    <div id="section-events">
      <div class="filters">
        <span class="filter-label">Category:</span>
        <button class="chip active" data-filter="all" onclick="filterChip(this)">All</button>
        <button class="chip" data-filter="Music" onclick="filterChip(this)">Music</button>
        <button class="chip" data-filter="Technology" onclick="filterChip(this)">Technology</button>
        <button class="chip" data-filter="Arts & Theatre" onclick="filterChip(this)">Arts</button>
        <button class="chip" data-filter="Sports" onclick="filterChip(this)">Sports</button>
        <button class="chip" data-filter="Family" onclick="filterChip(this)">Family</button>
        <select id="sort-select" onchange="changeSort(this.value)">
          <option value="date,asc">Date: Soonest</option>
          <option value="date,desc">Date: Latest</option>
          <option value="name,asc">Name: A-Z</option>
          <option value="relevance,desc">Relevance</option>
        </select>
      </div>

      <div id="events-container">
        <div class="empty-state">
          <p>Search for an event or select a category to get started.</p>
        </div>
      </div>

      <div class="pagination" id="pagination" style="display:none">
        <button id="btn-prev" onclick="doSearch(currentPage - 1)">Previous</button>
        <span id="page-info"></span>
        <button id="btn-next" onclick="doSearch(currentPage + 1)">Next</button>
      </div>
    </div>

    <div id="section-holidays" style="display:none">
      <div class="holiday-controls">
        <div class="holiday-row">
          <div>
            <label for="country-select">Country</label>
            <select id="country-select">
              <option value="RW">Rwanda</option>
            </select>
          </div>
          <div>
            <label for="year-select">Year</label>
            <select id="year-select">
              <option value="2025">2025</option>
              <option value="2026" selected>2026</option>
              <option value="2027">2027</option>
            </select>
          </div>
          <button onclick="loadHolidays()">Load Holidays</button>
        </div>
      </div>
      <div id="holidays-container">
        <div class="empty-state">
          <p>Select a country and year then click Load Holidays.</p>
        </div>
      </div>
    </div>

  </main>

  <footer class="footer">
    <p>EventConnect &mdash; Powered by Ticketmaster API &amp; Nager.Date API</p>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
